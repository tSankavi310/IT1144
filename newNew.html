<!DOCTYPE html>
<html>
<head>
    
    <title>Web Development ICA Practice</title>
    
    <style>
       
        body {
            background-image:url(art2.jpeg);
            background-size: cover;
            background-position:center ;
            background-attachment:fixed ;
            font-family:Arial ;
            margin: 0;
            padding: 0;
            color:#333;
        }

        /* 3. Add Navigation Bar & 2. Add Logo */
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #007bff;
        }

        /* Container for Form and Table */
        .main-container {
            max-width: 900px;
            margin: 40px auto;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            color: #007bff;
        }

        /* 5. Form Design */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display:block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
		}
			
        button:hover {
            background-color: #0056b3;
        }

        /* 5. Table Design */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <!-- 2 & 3. Navigation Bar and Logo -->
    <nav class="navbar">
        <!-- Text-ai logo-va use panniruken, unga kitta photo irundha <img> tag podalaam -->
        <a href="#" class="logo">MyUniversity</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <!-- 4. Add Hyperlink to Google -->
            <a href="https://www.google.com" target="_blank">Google Link</a>
        </div>
    </nav>

    <div class="main-container">
        <!-- 5. Forms Section -->
        <h2>Student Registration Form</h2>
        <form id="studentForm">
            <div class="form-group">
                <label for="studentName">Student Name:</label>
                <input type="text" id="studentName" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="studentEmail">Email Address:</label>
                <input type="email" id="studentEmail" placeholder="Enter your email" required>
            </div>
            <button type="submit">Submit Data</button>
        </form>

        <br><br>

        <!-- 5. Table Section -->
        <h2>Registered Students List</h2>
        <table id="studentTable">
            
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
            
			
                
            
            
        </table>
    </div>

    <script>
        // Form submit aagum pothu intha JavaScript velai seiyum
        document.getElementById('studentForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Page refresh aavathai thadukka

            // Form inputs-la irunthu values-ai edukka
            let name = document.getElementById('studentName').value;
            let email = document.getElementById('studentEmail').value;

            // Simple JavaScript Alert message
            alert("Success! Form submitted for: " + name);

            // Table-la puthu row add panna (Optional smart feature)
            let table = document.getElementById('studentTable').getElementsByTagName('tbody')[0];
            let newRow = table.insertRow();
            
            let nameCell = newRow.insertCell(0);
            let emailCell = newRow.insertCell(1);
            
            nameCell.innerText = name;
            emailCell.innerText = email;

            // Form-ai clear panna
            document.getElementById('studentForm').reset();
        });
    </script>

    
</body>
</html>
